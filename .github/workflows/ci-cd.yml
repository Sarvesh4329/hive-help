name: CI/CD

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  packages: write

jobs:
  build-test-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Detect test script
        id: tests
        run: |
          node scripts/detect-tests.js backend/package.json >> $GITHUB_OUTPUT

      - name: Install backend dependencies
        if: steps.tests.outputs.shouldRun == 'true'
        run: npm ci
        working-directory: backend

      - name: Run backend tests
        if: steps.tests.outputs.shouldRun == 'true'
        run: npm test
        working-directory: backend

      - name: Set image name
        id: image
        run: |
          echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            MONGODB_URI=${{ secrets.MONGODB_URI }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            NODE_ENV=${{ secrets.NODE_ENV }}
            PORT=${{ secrets.PORT }}

  deploy:
    needs: build-test-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Set lower case repo name
        id: repo
        run: echo "name=${GITHUB_REPOSITORY,,}" >> $GITHUB_OUTPUT

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # ── 1. Ensure Docker is installed ─────────────────────────────
            if ! command -v docker > /dev/null 2>&1; then
              sudo apt-get update && sudo apt-get install -y docker.io
              sudo systemctl enable --now docker
            fi

            # ── 2. Clean up K8s, nginx and old iptables rules ─────────────
            sudo systemctl stop k3s 2>/dev/null || true
            sudo systemctl stop nginx 2>/dev/null || true
            sudo iptables -t nat -F 2>/dev/null || true

            # ── 3. Login to GHCR ──────────────────────────────────────────
            echo "${{ secrets.GITHUB_TOKEN }}" | sudo docker login ghcr.io \
              -u ${{ github.actor }} --password-stdin

            # ── 4. Pull latest image ──────────────────────────────────────
            sudo docker pull ghcr.io/${{ steps.repo.outputs.name }}:latest

            # ── 5. Stop old container and start fresh ─────────────────────
            sudo docker stop hive-help 2>/dev/null || true
            sudo docker rm hive-help 2>/dev/null || true

            sudo docker run -d \
              --name hive-help \
              --restart unless-stopped \
              -p 80:80 \
              -p 5000:5000 \
              ghcr.io/${{ steps.repo.outputs.name }}:latest

            sleep 3
            sudo docker ps | grep hive-help
            echo "✅ App live at http://$(curl -s ifconfig.me)"
