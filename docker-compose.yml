services:
  app:
    image: ghcr.io/sarvesh4329/hive-help:latest
    ports:
      - "80:80"
    environment:
      - MONGODB_URI=${MONGODB_URI}
      - JWT_SECRET=${JWT_SECRET}
      - NODE_ENV=${NODE_ENV}
      - PORT=${PORT}
    restart: always

  watchtower:
    image: containrrr/watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 60 --cleanup --run-once=false
    environment:
      - DOCKER_API_VERSION=1.40
      - REPO_USER=${GHCR_USER}
      - REPO_PASS=${GHCR_PAT}
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
    restart: always
